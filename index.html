<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Acceso</title>
<style>
:root{--bg:#efeee8;--card:#fff;--tx:#1d1d1b;--tx2:#5f5e5a;--info:#185fa5;--bd:rgba(0,0,0,.13);--rad:12px}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;color:var(--tx);padding:20px}
.card{background:var(--card);border:.5px solid var(--bd);border-radius:var(--rad);max-width:380px;width:100%;padding:30px 28px;box-shadow:0 10px 34px rgba(0,0,0,.09)}
h1{font-size:18px;font-weight:600;margin:0 0 4px}
.sub{font-size:13px;color:var(--tx2);line-height:1.5;margin:0 0 22px}
label{display:block;font-size:12px;font-weight:600;margin:0 0 5px}
input{width:100%;padding:10px 12px;font-size:14px;border:1px solid var(--bd);border-radius:8px;margin-bottom:14px;font-family:inherit}
input:focus{outline:2px solid var(--info);border-color:var(--info)}
.show{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:400;color:var(--tx2);margin:-6px 0 14px;cursor:pointer}
.show input{width:auto;margin:0}
button{width:100%;padding:11px;font-size:14px;font-weight:600;color:#fff;background:var(--info);border:none;border-radius:8px;cursor:pointer}
button:hover{background:#14507f}
button:disabled{opacity:.6;cursor:default}
.err{font-size:12px;color:#A32D2D;margin:0 0 12px;min-height:16px}
.hint2{font-size:12px;color:var(--tx2);text-align:center;line-height:1.5;margin:14px 0 0}
.foot{font-size:11px;color:#70706b;text-align:center;margin-top:10px}
</style>
</head>
<body>
<form class="card" id="f">
  <h1>Acceso restringido</h1>
  <p class="sub">Contenido interno y confidencial. Ingresa tus datos de acceso para continuar.</p>
  <label for="u">Usuario</label>
  <input id="u" autofocus autocomplete="username" autocapitalize="off" spellcheck="false" required>
  <label for="p">C&oacute;digo de acceso</label>
  <input id="p" type="password" autocomplete="current-password" required>
  <label class="show"><input type="checkbox" id="sp"> Mostrar c&oacute;digo</label>
  <p class="err" id="e"></p>
  <button id="b" type="submit">Entrar</button>
  <p class="hint2">&iquest;No tienes el usuario y c&oacute;digo? Sol&iacute;citalos a quien te comparti&oacute; este enlace.</p>
  <p class="foot">Acceso solo para personal autorizado</p>
</form>
